notes: Cross-cousin (mother's brother's daughter, மாமன் மகள், maaman magal) marriage is preferred across Dravidian-speaking South India. Epidemiological literature notes a roughly 2x baseline rise in autosomal recessive disorder incidence in offspring of first-cousin unions, though absolute risk remains low for most conditions.
