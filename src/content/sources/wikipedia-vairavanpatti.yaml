notes: >-
  Entry on Vairavanpatti village (Sivaganga district, ~2 km from Pillaiyarpatti,
  between Madurai and Karaikudi; R. Palakurichi panchayat). States the temple's
  presiding deity is "Lord Valaroli Nathar and his consort Vadivudai Ammai.
  Bhairavar here is prominent, hence the name Vairavan-patti" — i.e. the moolavar
  is a Shiva form (Valaroli Nathar), with Bhairava the prominent deity that names
  the village. Confirms the temple as one of the nine temples held in high esteem
  by the Nagarathar Chettiar community.
