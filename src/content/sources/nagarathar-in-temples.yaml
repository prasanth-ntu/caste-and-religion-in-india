year: 2024
url: https://nagarathar.in/temples/
notes: >-
  Community reference listing the nine Nagarathar (Nattukottai Chettiar) clan
  temples and the internal sub-divisions (pirivu / vagupu) of each. Records the
  Vairavan Kovil sub-divisions as Sirukulattur (Periya Vakuppu; Teyanar /
  Tevanayakkar; Pillaiyar Vakuppu), Kalanivasal, and Maruttendrapuram. Used for
  the temple-clan internal-structure claim; the page lists sub-divisions but does
  not itself state inter-pirivu marriage rules.
