notes: >-
  Overview of the Chettiar mercantile title/cluster of Tamil Nadu. Notes that
  Chettiar communities claim Vaishya varna status, and that this claim is
  historically contested — some sources record an earlier Shudra classification
  with a later (often colonial-era) assertion of Vaishya status. Use for the
  varna-classification caveat.
