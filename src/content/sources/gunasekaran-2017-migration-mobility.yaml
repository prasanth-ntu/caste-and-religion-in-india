id: gunasekaran-2017-migration-mobility
type: paper
title: "Migration and Mobility: The Social Memory of Kongu Vellalar Peasantry of South India"
authors:
  - S. Gunasekaran
year: 2017
url: https://www.routledge.com/Migrations-in-Medieval-and-Early-Colonial-India/Ramaswamy/p/book/9781138488540
notes: >-
  In V. Ramaswamy (Ed.), Migrations in Medieval and Early Colonial India
  (pp. 155–180). Routledge. ISBN 978-1-138-48854-0. Uses palm-leaf
  manuscripts (Pattayams) and inscriptions to trace migration history of
  the Kongu Vellala community and the social memory of clans across 24
  Nadus. Provides historical backbone for the kootam settlement geography.
