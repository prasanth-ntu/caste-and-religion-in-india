notes: Hindu funerary samskara. Dharmaśāstric texts (Manusmṛti, Garuḍa Purāṇa) prescribe pollution periods of 10–16 days during which surviving kin avoid temple entry and ceremonial participation. The 16-day Tamil karumathi (கருமாதி) period is the regional realisation.
