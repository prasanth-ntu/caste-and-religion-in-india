id: beck-1972-peasant-society-konku
type: book
title: "Peasant Society in Konku: A Study of Right and Left Subcastes in South India"
authors:
  - Brenda E. F. Beck
year: 1972
url: https://archive.org/details/peasantsocietyin0000beck
notes: >-
  University of British Columbia Press. ISBN 0-7748-0014-3. The definitive
  ethnography of the Kongu Vellala social system. Chapters 2 covers the
  territorial and lineage structure (pp. 68–74), including the Nadu–kootam
  nexus and the concept of Kula Deivam linked to micro-regions. Kinship
  tables appendix at pp. 295–302. Gold-standard academic reference for the
  kulam–totem–deity triad.
