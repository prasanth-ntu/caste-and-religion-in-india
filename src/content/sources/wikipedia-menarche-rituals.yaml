notes: Cross-cultural overview of menarche rites. The Tamil manjal-neeraattu-vizha (மஞ்சள் நீராட்டு விழா, turmeric-bathing ceremony) is part of a broader South-Indian pattern that publicly marks fertility status. Public-health literature notes both supportive (community recognition) and harmful (isolation, school absence) dimensions.
