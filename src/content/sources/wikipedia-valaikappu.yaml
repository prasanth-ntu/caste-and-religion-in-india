notes: Tamil baby-shower ceremony performed in the seventh or ninth month of pregnancy. The expectant mother is adorned with bangles (வளை, valai) of glass, gold, or metal. Folk rationale claims sound vibrations soothe the foetus; documented social function is community support during late pregnancy.
