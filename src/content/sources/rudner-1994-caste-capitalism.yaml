id: rudner-1994-caste-capitalism
type: book
title: "Caste and Capitalism in Colonial India: The Nattukottai Chettiars"
authors:
  - David West Rudner
year: 1994
url: https://archive.org/details/castecapitalismi0000rudn
notes: >-
  University of California Press. ISBN 0-520-07236-7. The definitive academic
  study of the Nattukottai Chettiar (Nakarattar) merchant-banking caste,
  c. 1870–1930. Documents the nine ancestral temple-clans, the patrilineal
  joint-family firm (valavu / vilasam) structure, and the community's role in
  financing agriculture across Burma, Ceylon and Malaya. Argues — against Weber —
  that caste institutions were a vehicle, not an obstacle, for capitalist
  banking. Gold-standard reference for the mercantile-banking and Nava-Kovil
  claims.
