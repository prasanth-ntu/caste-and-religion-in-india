notes: Tamil cultivator caste-cluster historically associated with land-owning agriculture in the Kaveri delta, Kongu, Tondai, and Pandya regions. Several distinct sub-groups (Kondaikatti, Saiva Pillai, Kongu, Tuluva, Mudaliar).
