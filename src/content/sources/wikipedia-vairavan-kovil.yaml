notes: >-
  Entry on the Vairavan Swamy (Kala Bhairava) temple at Vairavanpatti,
  Sivaganga district, Tamil Nadu — one of the nine Nagarathar clan temples and
  also counted among the Ashta Bhairava sthalams. Records the deity (Kala
  Bhairava / Vairavan), consort (Vadivudai Ammai), the 1864 Nagarathar stone
  reconstruction, and the village-name etymology (Vairavan → Vairavanpatti).
