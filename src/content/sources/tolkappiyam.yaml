year: -200
url: https://en.wikipedia.org/wiki/Tolk%C4%81ppiyam
notes: Earliest extant Tamil grammar, conventionally dated between the 2nd century BCE and the early centuries CE. Codifies the tinai (eco-zone) framework and references Tamil social organisation predating the four-varna schema. Dating is contested; range may extend later.
