notes: Memorial stones (நடுகல், nadukal) erected in Tamil-speaking regions to commemorate warriors who died defending cattle, land, or kin. Earliest references are in Tolkappiyam and the Sangam corpus; later examples are inscribed and sometimes deified. Particularly dense in Kongu Nadu.
