notes: Nature Genetics 49, 1403–1407. Documents that many South Asian endogamous groups have founder-event severity comparable to or exceeding Ashkenazi Jews and Finns. Often summarised in popular press as "tighter than Ashkenazi/Finns" — true for many but not all groups.
