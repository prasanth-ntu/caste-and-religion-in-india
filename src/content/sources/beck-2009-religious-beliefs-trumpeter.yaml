id: beck-2009-religious-beliefs-trumpeter
type: paper
title: "Religious Beliefs, Indigenous Communities and Environmental Preservation in Western Tamil Nadu, South India"
authors:
  - Brenda E. F. Beck
year: 2009
url: https://trumpeter.athabascau.ca/index.php/trumpet/article/download/1090/1464/3877
notes: >-
  Published in The Trumpeter: Journal of Ecosophy, Volume 25, Number 2.
  Pages 56–61 document specific clan totem taboos across Kongu Vellala
  kootams, including the Maniyan clan's prohibition on cutting the Naval
  Maram (Syzygium cumini) and the Senganni clan's preservation of the Vengai
  tree (Pterocarpus marsupium). Directly corroborates community-tier claims
  on totemic taboos at academic level.
