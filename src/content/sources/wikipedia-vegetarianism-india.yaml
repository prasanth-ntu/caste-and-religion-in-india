title: Vegetarianism in India
authors:
  - Wikipedia contributors
year: 2024
url: https://en.wikipedia.org/wiki/Vegetarianism_in_India
notes: National survey data (NFHS-4, NFHS-5) shows roughly 20-39% of Indians self-report vegetarianism; sub-survey adjustments for under-reporting (Natrajan & Jacob 2018, EPW) suggest the true figure is closer to 20%. Vegetarianism correlates with caste rank but is far from universal among upper-caste groups, including segments of Vellala communities.
