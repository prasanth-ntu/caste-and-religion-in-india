notes: >-
  Community reference listing the nine clan temples (Nava Kovil) of the
  Nagarathar — Ilayathangudi, Mathur, Vairavan Kovil, Iraniyur, Pillaiyarpatti,
  Nemam, Iluppaikudi, Surakudi and Velangudi — and explaining that each temple
  defines an exogamous "pangali" cluster within which marriage is barred.
  Community-attestation tier; corroborated by Rudner (1994) for the structural
  claim.
