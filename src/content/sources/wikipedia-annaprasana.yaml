year: 2024
url: https://en.wikipedia.org/wiki/Annaprashana
notes: Hindu samskara marking an infant's first intake of solid food, typically rice, performed around six months of age. In Tamil contexts called சோறு கொடுத்தல் (choru koduthal). Aligns with WHO weaning guidance to introduce complementary foods around six months.
