title: Vellala tank-and-well irrigation expansion in Kongu
summary: During the late Chola and post-Chola period, cultivator communities — among them the Kongu Vellala — expand tank-fed (ஏரி, eri) and well-fed (கமலை, kamalai) irrigation across the semi-arid Kongu landscape, enabling paddy, cotton, and later sugarcane cultivation.
