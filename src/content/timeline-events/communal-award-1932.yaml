title: Communal Award and Poona Pact
summary: British Prime Minister Ramsay MacDonald's Communal Award grants separate electorates to Depressed Classes. Gandhi opposes it with a fast-unto-death; the resulting Poona Pact between Gandhi and Ambedkar replaces separate electorates with reserved seats — the constitutional template for post-independence reservation.
