title: Emergence of kudis and velir chiefs
summary: Sangam-era inscriptions and poetry describe kudis (குடி, settled lineage groups) and velir chiefs (வேளிர்) — small-scale chiefly lineages distinct from the three crowned kings. Several South Indian cultivator castes, including the broader Vellala cluster, later trace partial descent from velir lineages.
