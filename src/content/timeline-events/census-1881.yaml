title: 1881 Census of India records caste at scale
summary: The British colonial 1881 Census (following the earlier 1871 operation) records caste affiliation across the subcontinent on a unified administrative grid for the first time. The exercise pressures fluid, regionally-variable jati identities into fixed pan-Indian categories.
