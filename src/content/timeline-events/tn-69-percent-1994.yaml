title: Tamil Nadu's 69% reservation shielded by the Ninth Schedule
summary: The Tamil Nadu Reservation Act 1993 maintains 69% reservation in education and public employment, exceeding the Supreme Court's 50% ceiling set in Indra Sawhney. The 76th Constitutional Amendment (1994) places the Act in the Ninth Schedule to shield it from judicial review.
