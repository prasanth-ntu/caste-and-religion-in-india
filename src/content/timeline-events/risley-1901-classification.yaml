title: Risley's racial classification of Indian castes
summary: Herbert Hope Risley, as Census Commissioner of India in 1901, classifies castes by anthropometric racial type — most notoriously by nasal index. The methodology is now thoroughly rejected by anthropology and genetics, but it shaped administrative caste-as-race thinking for decades.
