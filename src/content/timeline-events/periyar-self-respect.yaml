title: Periyar and the Self-Respect Movement
summary: E. V. Ramasamy ("Periyar") founds the Self-Respect Movement (1925) and later the Dravidar Kazhagam (1944), driving Tamil anti-caste, anti-Brahmin, and rationalist political mobilisation. The movement reshapes Tamil Nadu's political landscape and underwrites the state's later reservation regime.
