title: Imperial Chola temple economy
summary: The Cholas patronise massive stone temple construction across South India, with Brihadisvara at Thanjavur (consecrated c. 1010 CE) as the imperial flagship. Temples become major landholders, irrigation managers, and credit institutions — restructuring agrarian society including in Kongu Nadu.
