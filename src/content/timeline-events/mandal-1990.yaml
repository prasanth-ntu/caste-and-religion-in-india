title: Mandal Commission implementation
summary: The V. P. Singh government implements the Mandal Commission's recommendation of 27% reservation for OBCs in central government employment on 7 August 1990. Triggers nationwide protests and the Indra Sawhney v. Union of India (1992) case, in which the Supreme Court upholds OBC reservation while capping total reservation at 50%.
