id: varna-not-equal-jati
statement: Varna (the four-fold theoretical schema) and jāti (கடி / குலம், endogamous birth groups numbering in the thousands) are distinct categories; jati does not map cleanly onto varna in lived practice.
tier: green
sources:
  - wikipedia-varna-hinduism
  - wikipedia-jati
  - thapar-2002-early-india
  - bayly-1999-caste
evidence_summary: This distinction is one of the most stable points of consensus in Indological and sociological scholarship. Many jatis claim variable or contested varna affiliations, and several large communities (including most South Indian non-Brahmin cultivator castes) sit awkwardly within the four-varna grid.
