id: naadu-kal-hero-stones
statement: Nadukal (நடுகல், hero stones) commemorating warriors who died defending cattle, land, or kin are densely attested across Kongu Nadu and form one of the oldest continuous Tamil memorial traditions.
tier: yellow
sources:
  - wikipedia-hero-stone
  - tolkappiyam
  - sangam-corpus
evidence_summary: >-
  Tolkappiyam describes a six-stage hero-stone protocol; surviving inscribed
  stones across Kongu, Konganadu, and the Karnataka borderland confirm the
  practice from the Sangam era through medieval times. The specific
  attribution of individual stones to named Kongu Vellala ancestors is
  often community-internal and not independently corroborated, hence
  yellow rather than green for the lineage claim. The practice itself is
  green-tier well-attested.
