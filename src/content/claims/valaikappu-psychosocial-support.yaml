id: valaikappu-psychosocial-support
statement: Valaikappu (வளைகாப்பு) — the seventh-month bangle ceremony — functions as community-organised antenatal psychosocial support for the expectant mother, with the bangle and turmeric symbolism layered on top.
tier: rational
sources:
  - wikipedia-valaikappu
rational_basis: >-
  Late-pregnancy social support is a well-replicated protective factor
  against perinatal depression. The ritual gathers the woman's natal and
  marital kin, formalises gift-giving (clothes, bangles, food), and
  publicly assigns her a recognised status — all measurable benefits even
  if the folk explanations ("bangle sounds soothe the foetus", "iron bangles
  strengthen bones") are not borne out by evidence. Iron-from-bangle skin
  absorption is not physiologically meaningful at the doses involved.
evidence_summary: >-
  Antenatal social-support effects on maternal mental health are robust in
  the public-health literature. The specific folk-physiological claims about
  bangle vibration and iron absorption are not supported. The ritual is
  sensibly tiered rational-basis because its real benefit is social, not
  the claimed physical mechanism.
