id: founder-events-tighter-than-ashkenazi
statement: Many Indian jati groups carry founder-event signatures comparable to — and in several cases more severe than — those of Ashkenazi Jews and Finns, due to roughly two millennia of strict endogamy.
tier: yellow
sources:
  - nakatsuka-2017-natgen
  - moorjani-2013-ajhg
evidence_summary: Nakatsuka et al. (2017) document founder-event severity across dozens of South Asian groups; many but not all exceed the Ashkenazi/Finnish baseline. The popular framing — "Indian endogamy is the most extreme on Earth" — overgeneralises a finding that is group-specific. Tiered yellow because the headline claim is often stated more strongly than the paper supports, and because Kongu Vellala specifically may not have been sampled.
