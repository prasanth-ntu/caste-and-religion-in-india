id: kongu-totem-clan-deity-triad
statement: Across Kongu Vellala kootams, the relationship between totem, clan, and deity follows a coherent ecological-ritual logic — the deity chooses the totem, the totem preservation rule protects the local species, and the clan's collective obligation to maintain the temple perpetuates both the ecological and social order.
tier: rational
sources:
  - globalkongufoundation-maniyan
  - kongu-mandala-satakam
  - beck-1972-peasant-society-konku
  - beck-2009-religious-beliefs-trumpeter
evidence_summary: >-
  This is a structural interpretation, not a supernatural claim. The pattern is observable across multiple Kongu kootams (Naval / Maniyan, Vengai / Senganni, Vilva / Vilayan, Banyan / Aalan, etc.) and is coherent with well-documented South Asian totemic and eco-sacred traditions. Beck (1972, pp. 68–74) establishes the triad principle: "a kulam cannot be viewed merely as a lineage group; it is a triad consisting of the human clan, their structural plant/animal taboo (the totem), and the territorial boundary god guarding them." Beck (2009, pp. 56–61) provides specific clan-by-clan taboo documentation.
