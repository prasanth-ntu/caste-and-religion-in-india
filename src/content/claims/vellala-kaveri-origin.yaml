id: vellala-kaveri-origin
statement: The Vellala (வேளாளர்) caste-cluster originated as elite land-owning cultivators of the Kaveri delta and other wet-rice zones during and after the Sangam era, expanding subsequently into Kongu, Tondai, and Pandya country.
tier: yellow
sources:
  - wikipedia-vellalar
  - sangam-corpus
  - bayly-1999-caste
evidence_summary: A Kaveri-delta origin is the most commonly cited scholarly hypothesis and fits the Sangam-era references to ulavar (உழவர், cultivators) and the velir chiefly class. However, exact phylogeny across Vellala sub-groups (Kondaikatti, Saiva Pillai, Kongu Vellala, Tuluva, Mudaliar) is contested and partly mythologised in the community's own genealogical literature.
