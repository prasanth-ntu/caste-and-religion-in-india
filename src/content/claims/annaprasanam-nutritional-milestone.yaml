id: annaprasanam-nutritional-milestone
statement: Annaprasanam / சோறு கொடுத்தல் (choru-koduthal) — the first feeding of solid rice around six months — aligns with the WHO and AAP recommendation that complementary foods be introduced around six months of age, when exclusive breast-milk no longer meets infant iron and zinc needs.
tier: rational
sources:
  - wikipedia-annaprasana
rational_basis: >-
  Around six months, infants' iron stores from gestation are depleted and
  exclusive breastfeeding stops meeting micronutrient needs; introduction of
  complementary foods at this point is the modern paediatric standard. The
  ritual encodes a public, kin-witnessed transition at the right developmental
  window — a useful coordination device in pre-clinical societies. The choice
  of rice gruel is appropriate first-food: bland, easily mashed, locally
  abundant.
evidence_summary: >-
  The six-month introduction window is well-evidenced in modern paediatric
  nutrition guidelines. That the Hindu samskara happens to fall at that age
  is consistent with cultural codification of a real developmental milestone,
  though not unique to this tradition.
