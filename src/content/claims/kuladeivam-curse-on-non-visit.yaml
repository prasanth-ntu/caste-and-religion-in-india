id: kuladeivam-curse-on-non-visit
statement: Failure to visit one's Kuladeivam (குலதெய்வம், clan deity) shrine for major life events brings supernatural misfortune — illness, infertility, or accidents — upon the family.
tier: red
sources:
  - wikipedia-kongu-vellalar
rebuttal: >-
  There is no controlled evidence that visiting or not visiting a particular
  village shrine causally affects health, fertility, or accidents. The belief
  is a real cultural fact and serves real social functions (see the
  rational-basis ritual entries — lineage registry, diaspora reunion,
  intergenerational signalling), but the supernatural-causation claim is folk
  explanation, not evidence-supported. The persistence of the belief through
  confirmation bias and survivorship reporting is well-understood in the
  anthropology of religion.
evidence_summary: >-
  The claim functions as a sanction enforcing clan-cohesion behaviour. Its
  social effects are real; its supernatural mechanism is not demonstrated and
  is not testable in the form it is usually stated.
