id: british-1881-census-codified-caste
statement: The British colonial census operations, beginning with 1871/1881 and intensifying in 1901, codified caste categories at scale and hardened previously fluid social distinctions into administrative categories.
tier: green
sources:
  - dirks-2001-castes-of-mind
  - bayly-1999-caste
  - wikipedia-1881-census
evidence_summary: Dirks (2001) and Bayly (1999) both argue, with extensive archival evidence, that decennial census enumeration forced flexible, regionally-variable jati identities into fixed pan-Indian taxonomies. This is the standard scholarly view in postcolonial South Asian historiography.
