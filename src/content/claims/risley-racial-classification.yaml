id: risley-racial-classification
statement: Herbert Hope Risley's 1901 Census of India classified Indian castes by anthropometric racial type, especially the nasal index — a framework subsequently rejected by mainstream anthropology and genetics.
tier: green
sources:
  - wikipedia-herbert-risley
  - dirks-2001-castes-of-mind
  - bayly-1999-caste
evidence_summary: Risley's methodology is reproduced in the 1901 Census reports themselves. Its scientific rejection is universal in modern physical anthropology; its political consequences (hardening of caste-as-race) are documented at length in Dirks (2001).
