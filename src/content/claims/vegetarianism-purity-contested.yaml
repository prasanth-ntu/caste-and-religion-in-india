id: vegetarianism-purity-contested
statement: The framing of vegetarianism as a marker of caste purity, with rank rising as meat-eating decreases, is empirically contested — large portions of upper-caste communities (including Kongu Vellala) eat meat, and the "purity-ladder" is partly a Brahminical projection.
tier: yellow
sources:
  - wikipedia-vegetarianism-india
  - bayly-1999-caste
evidence_summary: >-
  NFHS-5 data and Natrajan & Jacob's reanalysis indicate that self-reported
  vegetarianism is substantially over-reported, and that meat consumption
  spans all caste categories. Kongu Vellala practice is mixed: many
  households eat mutton and chicken on festival days, fish in some
  riverine pockets, and abstain on specific Kuladeivam observance days
  rather than as a lifelong rule. The purity-hierarchy framing thus
  describes an ideology, not the empirical pattern. Tiered yellow because
  the ideology is real and consequential even where the empirical claim
  fails.
