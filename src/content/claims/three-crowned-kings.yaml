id: three-crowned-kings
statement: Tamilakam during the Sangam period was dominated by three crowned dynasties — Chera, Chola, and Pandya — with Kongu Nadu (கொங்கு நாடு) sitting at the intersection of their spheres.
tier: green
sources:
  - wikipedia-sangam-period
  - wikipedia-chera-dynasty
  - wikipedia-chola-dynasty
  - wikipedia-pandya-dynasty
  - sangam-corpus
evidence_summary: The Mūvēndar (மூவேந்தர், "three crowned kings") schema is attested across the Sangam corpus and corroborated by epigraphy. Standard consensus in Tamil and South Indian historiography.
