id: chettiar-vaishya-classification
statement: The Nattukottai Chettiar / Nagarathar are conventionally placed in the Vaishya (merchant) varna, but this classification is historically contested — like most Tamil caste-to-varna mappings, it reflects later self-assertion as much as any stable ancient category.
tier: yellow
sources:
  - wikipedia-chettiar
  - wikipedia-nagarathar
rebuttal: Some sources record the Chettiars as originally Shudra-classified, with the Vaishya claim asserted more recently (often in the colonial census era) — so "Vaishya" describes a claimed and widely-accepted status, not an uncontested ancient fact.
evidence_summary: >-
  Tamil caste communities map poorly onto the four-varna schema, which is a north-Indian textual category. The Nagarathar are widely described as a Vaishya mercantile caste, and that self-identification is well established today. But the historical record is mixed: some sources note an earlier Shudra classification with a subsequent assertion of Vaishya status, frequently in the context of colonial-census self-positioning. This mirrors the Vellala case (neither cleanly Kshatriya, Vaishya nor Shudra) — the varna label is best read as a contested status claim rather than a fixed ancient category. Treat the mercantile identity as green; the specific varna assignment as yellow.
