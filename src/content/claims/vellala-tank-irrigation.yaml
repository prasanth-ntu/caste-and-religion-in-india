id: vellala-tank-irrigation
statement: Kongu Vellala communities historically specialised in tank-fed (ஏரி, eri) and well-fed (கமலை, kamalai) irrigation in the semi-arid Kongu region, supporting paddy, cotton, and sugarcane cultivation.
tier: yellow
sources:
  - wikipedia-kongu-vellalar
  - bayly-1999-caste
evidence_summary: Regional agrarian histories consistently describe Kongu Nadu's tank-and-well hydrology and the Vellala role within it. Tiered yellow rather than green because the specific division of labour, and the degree of exclusivity of the Vellala role versus other Kongu cultivator communities, is less rigorously documented than the existence of the system itself.
