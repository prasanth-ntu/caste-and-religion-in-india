id: ambedkar-drafted-constitution
statement: B. R. Ambedkar chaired the drafting committee of the Indian Constitution and was the principal architect of its anti-discrimination provisions, including Article 17.
tier: green
sources:
  - wikipedia-ambedkar
  - wikipedia-article-17
evidence_summary: Constituent Assembly debates (1946–1949) and standard historical accounts converge on Ambedkar's role. Uncontested in academic and legal scholarship.
