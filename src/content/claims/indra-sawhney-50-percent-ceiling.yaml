id: indra-sawhney-50-percent-ceiling
statement: In Indra Sawhney v. Union of India (1992), a nine-judge bench of the Supreme Court upheld OBC reservation under Mandal but capped total caste-based reservation at 50% of available seats — a ceiling that Tamil Nadu's 69% Reservation Act 1993 was deliberately shielded from by insertion into the Ninth Schedule of the Constitution via the 76th Amendment in 1994.
tier: green
sources:
  - wikipedia-reservation-in-india
  - wikipedia-tn-reservation
  - wikipedia-mandal-commission
evidence_summary: The Indra Sawhney judgment (also called the Mandal Commission case) is a foundational ruling in Indian reservation jurisprudence. The 50% ceiling, the validation of OBC reservation, and the "creamy layer" exclusion are all part of the published bench opinion. The 76th Amendment's specific intent of shielding the TN Act from the ceiling is documented in the amendment's statement of objects and reasons.
