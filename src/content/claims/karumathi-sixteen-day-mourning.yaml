id: karumathi-sixteen-day-mourning
statement: The Tamil sixteen-day mourning observance (கருமாதி, karumathi) follows the dharmaśāstric pollution-period schema but is implemented with wide regional and household variation in modern practice.
tier: yellow
sources:
  - wikipedia-antyesti
evidence_summary: >-
  Dharmaśāstric texts prescribe 10–16-day āśauca (ritual impurity) periods
  for survivors. The 16-day Tamil karumathi schedule with day-1 cremation,
  day-3 ash collection, and day-16 final feast is well-attested. Modern
  observance ranges from full traditional sequence to compressed weekend
  observance among urban diaspora. The grief-structuring social function
  is plausibly beneficial; the "pollution transfer" framing has no
  evidentiary basis but is rarely the primary motivation today.
