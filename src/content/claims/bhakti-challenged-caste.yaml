id: bhakti-challenged-caste
statement: The Tamil Bhakti movement (Alvars and Nayanars, c. 6th–10th centuries CE) included poet-saints from a wide range of caste backgrounds and articulated a devotional theology that, at least rhetorically, relativised caste hierarchy.
tier: yellow
sources:
  - wikipedia-bhakti-movement
  - thapar-2002-early-india
evidence_summary: The hagiographical Periya Puranam and Divya Prabandham canons include saints from non-Brahmin and "low" caste backgrounds. Scholarly debate is ongoing about how far the social radicalism of the poetry translated into actual structural change — the institutional Bhakti tradition often re-absorbed caste norms.
