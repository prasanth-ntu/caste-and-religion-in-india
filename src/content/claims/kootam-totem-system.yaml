id: kootam-totem-system
statement: Each of the 145 Kongu Vellala kootams is associated with a totem — typically a bird, animal, fish, tree, or flower — that the kootam members traditionally avoid harming or eating.
tier: yellow
sources:
  - wikipedia-kongu-vellalar
  - kongu-mandala-satakam
evidence_summary: The totem (குலதெய்வச் சின்னம் / குலச்சின்னம்) system is consistently described in community ethnography and oral tradition. The total of 145 is widely cited but the canonical list varies slightly across sources, and the antiquity of the totem-clan structure is not securely dated.
