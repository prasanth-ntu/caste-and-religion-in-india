id: vairavanpatti-bhairava
statement: The temple at Vairavanpatti (Sivaganga district, Tamil Nadu) has as its presiding deity (moolavar) Lord Valaroli Nathar — a form of Shiva — with consort Vadivudai Ammai; Bhairava (Vairavar) is the prominent deity here, from which the village takes its name. It is one of the nine Nagarathar clan-temples as well as one of the Ashta Bhairava sthalams; the present stone temple was reconstructed by the Nagarathar in 1864.
tier: green
sources:
  - wikipedia-vairavanpatti
