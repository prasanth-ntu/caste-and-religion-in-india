id: vairavanpatti-bhairava
statement: The Vairavan Swamy temple at Vairavanpatti (Sivaganga district, Tamil Nadu) is dedicated to Kala Bhairava — "Vairavan" in Tamil, from which the village takes its name — and is one of the nine Nagarathar clan-temples as well as one of the Ashta Bhairava sthalams; the present stone temple was reconstructed by the Nagarathar in 1864.
tier: green
sources:
