evidence_summary: >-
  The Vairavan Kovil at Vairavanpatti is a documented Hindu temple dedicated to Kala Bhairava (Vairavar) with consort Vadivudai Ammai; it is counted both among the nine Nagarathar temple-clans (Nava Kovil) and among the Ashta Bhairava sthalams. The village name derives from the deity. The temple is conventionally described as roughly five centuries old, with the Nagarathar replacing the original mud structure in stone in 1864. The temple's existence, dedication and Nava-Kovil membership are well established; the precise founding date is traditional.
