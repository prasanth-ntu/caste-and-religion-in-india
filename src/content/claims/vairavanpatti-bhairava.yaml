evidence_summary: >-
  Wikipedia's Vairavanpatti entry states the presiding deity is "Lord Valaroli Nathar and his consort Vadivudai Ammai. Bhairavar here is prominent, hence the name Vairavan-patti." So the temple's moolavar is a Shiva form (Valaroli Nathar); Bhairava (Vairavar / Kala Bhairava) is the prominent deity that gives the village — and the clan-temple — its identity, and the site is counted among the Ashta Bhairava sthalams as well as the nine Nagarathar temple-clans (Nava Kovil). The Nagarathar replaced the original structure in stone in 1864; the precise founding date is traditional. Popular and clan usage treats this as the "Vairavar" (Bhairava) temple — accurate as to its prominent deity rather than its formal moolavar.
