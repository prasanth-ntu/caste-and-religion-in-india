id: vilayan-village-name-discrepancy
statement: >-
  Two villages appear in oral accounts of the Vilayan Kulam kuladeivam — **Thalai Nallur** (Karur region) is the historical Kanioor / Muthal Kani (ancestral root village), while **Keelsathambur** (Paramathi Velur Taluk, Namakkal district) is the operational kuladeivam temple where Vilayan families gather for tonsure ceremonies (Mudi Kanikkai) and major clan rituals. The Keelsathambur temple is also known as Koonthappanai Sellandiamman Kovil; major Kumbabhishekam celebrated 2023-09-03.
tier: green
sources:
  - globalkongufoundation-maniyan
evidence_summary: >-
  The apparent discrepancy is resolved: Thalai Nallur is the historical ancestral origin village (Muthal Kani / Kanioor) of the Vilayan Kulam, while Keelsathambur hosts the living, operational kuladeivam temple (Koonthappanai Sellandiamman Kovil) at coordinates 11.081222°N, 78.039472°E. This is the standard pattern of Kongu Vellala settlement migration — the root village preserves ancestral memory while the current temple serves active ritual life. Confirmed via kovil.konguvellalarkulam.com community records and Wikipedia (Keelsathambur article). Kumbabhishekam date 2023-09-03 documented in community sources.
