id: senganni-vengai-sap-origin
statement: The Senganni Kootam name derives from "Senganni" (செங்கண்ணி — "red-eyed / fierce-eyed guardians"), and the clan's deity Pudhu Vengarai Amman is associated with the dark blood-red sap of the Vengai tree (Pterocarpus marsupium), which community tradition reads as a sign of fierce protective power.
tier: green
sources:
  - globalkongufoundation-maniyan
  - beck-2009-religious-beliefs-trumpeter
evidence_summary: >-
  Etymology and sap-symbolism connection reported in community oral tradition and online aggregator sources. Beck (2009, pp. 56–61) in The Trumpeter documents the Kongu Vellala kootam totemic system including clan-specific preservation taboos on the Vengai tree — upgrading from community-tier to academically attested. The specific blood-red sap symbolism link to the fierce-aspect goddess remains a community-tier interpretation.
