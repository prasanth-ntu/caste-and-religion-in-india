id: tn-69-percent-ninth-schedule
statement: Tamil Nadu maintains 69% caste-based reservation in education and public employment; the enabling 1993 state act was placed in the Ninth Schedule of the Constitution by the 76th Amendment in 1994 to shield it from the Supreme Court's 50% ceiling.
tier: green
sources:
  - wikipedia-tn-reservation
  - wikipedia-reservation-in-india
evidence_summary: The Tamil Nadu Reservation Act 1993, the 76th Constitutional Amendment, and the surrounding Indra Sawhney litigation are all matters of public legislative record. The 69% figure itself has been challenged but not struck down.
