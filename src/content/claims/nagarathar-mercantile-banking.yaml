id: nagarathar-mercantile-banking
statement: The Nattukottai Chettiars were a major South Indian merchant-banking caste who, from a homeland in the Chettinad area of the Madras Presidency, financed long-distance trade and agriculture across Burma, Ceylon and Malaya during the colonial period — by the late 1920s supplying the majority of agricultural credit in lower Burma.
tier: green
sources:
  - rudner-1994-caste-capitalism
  - wikipedia-nagarathar
evidence_summary: >-
  Rudner (1994) documents the Nattukottai Chettiar (Nakarattar) banking network in detail, c. 1870–1930, organised around patrilineal joint-family firms (valavu / vilasam), agent-apprenticeship, and community arbitration tied to the temple-clusters. By 1929 the Chettiars are estimated to have supplied roughly two-thirds of agricultural credit in lower Burma — a scale colonial banks rarely attempted. The community's wealth is materialised in the mansion architecture of Chettinad. The broad mercantile-banking history is well established; specific quantitative figures are period estimates and should be read as such.
