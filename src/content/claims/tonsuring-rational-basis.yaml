id: tonsuring-rational-basis
statement: Infant tonsuring (மொட்டை அடித்தல்) at the Kuladeivam temple combines a hygienic intervention with a practical genealogical and clan-registry function in pre-bureaucratic society.
tier: rational
sources:
  - wikipedia-kongu-vellalar
rational_basis: The first hair is typically thin, uneven, and often matted; full removal allows uniform regrowth and reduces cradle-cap and lice risk before the first hot Tamil summer. Performing the rite at the Kuladeivam temple gathers extended kin, registers the new child publicly within the clan, and creates a memorable life-cycle anchor in a society without civil birth records — a genuinely useful pre-bureaucratic genealogical function, distinct from the folk "removing past-life karma" explanation.
evidence_summary: Hygienic and social functions are well-attested in the comparative anthropology of birth rites. Karma-removal is the folk explanation and is not separately evidenced. The ritual is sensibly tiered as rational-basis.
