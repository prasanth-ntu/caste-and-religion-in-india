id: senganni-vengai-hollow-shrine
statement: Before a brick-and-mortar temple was built, the idol of Pudhu Vengarai Amman was historically placed inside the hollow or exposed roots of a massive Vengai tree; Vengai timber remains barred from ordinary commercial use by Senganni lineages.
tier: green
sources:
  - globalkongufoundation-maniyan
  - beck-2009-religious-beliefs-trumpeter
evidence_summary: >-
  Tree-hollow shrine origin is a well-documented pattern in South Indian folk deity tradition. Beck (2009, pp. 56–61) in The Trumpeter explicitly documents clan totem taboos for Kongu Vellala kootams including the Vengai-clan's preservation rules — upgrading the timber-prohibition element from community-tier to academically attested. The specific hollow-tree origin episode for this temple remains community oral attestation only.
