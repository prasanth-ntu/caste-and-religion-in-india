id: kootam-exogamy-rule
statement: Kongu Vellala Gounder marriage practice prescribes exogamy across kootams (கூட்டம், clan-lineage groups) — two people sharing a kootam should not marry, while specified maaman–machan (மாமன்–மச்சான்) cross-cousin pairings between distinct kootams are preferred.
tier: yellow
sources:
  - wikipedia-kongu-vellalar
  - kongu-mandala-satakam
evidence_summary: The 145-kootam exogamy framework is well-attested in community ethnography and oral tradition. Detailed pairing rules are documented in community-internal sources but have not been comprehensively cross-validated in peer-reviewed anthropology. Tiered yellow until an external ethnographic citation is added.
