id: aryan-invasion-replaced-dravidians
statement: A wave of Aryan invaders militarily replaced an indigenous Dravidian population in the second millennium BCE, with the caste system imposed by Aryan victors on Dravidian losers.
tier: red
sources:
  - reich-2009-nature
  - moorjani-2013-ajhg
  - thapar-2002-early-india
rebuttal: >-
  Modern population genetics (Reich 2009, Moorjani 2013) and ancient-DNA work
  since 2018 support a more complex picture — substantial gene flow from
  Steppe-related populations into northern South Asia during the 2nd millennium
  BCE, but admixture rather than replacement; deep continuity with earlier
  Indus Valley and South Asian hunter-gatherer ancestries; and the
  "Aryan/Dravidian" binary as a 19th-century philological inference rather
  than a clean genetic or military fact. Caste in its current form is
  post-Vedic and partly colonial, not the immediate output of a Bronze Age
  invasion.
evidence_summary: >-
  The hard "invasion-replacement" model is rejected; a softer "migration and
  admixture" model is well-supported. The crude version that aligns
  Aryan=upper-caste, Dravidian=lower-caste is contradicted by the ANI–ASI
  mixing pattern documented across most Indian groups including upper castes.
