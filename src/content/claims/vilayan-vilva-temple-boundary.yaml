id: vilayan-vilva-temple-boundary
statement: Ancient Vilva trees (Aegle marmelos) were kept intact to mark the boundaries of Sellandiamman's temple territory; Vilayan members do not cut Vilva trees or burn their wood, and Vilva leaf is indispensable in poojas.
tier: yellow
sources:
  - globalkongufoundation-maniyan
evidence_summary: Tree-boundary and pooja-leaf practice is consistent with pan-Tamil Vilva / Shiva association and is reported in Vilayan community oral tradition. The specific temple-boundary demarcation claim is community-attested; academic documentation absent.
