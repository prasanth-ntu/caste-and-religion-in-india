id: maniyan-naval-tree-origin
statement: The Maniyan Kulam traces its origin to an ancient Naval tree (Syzygium cumini) on the banks of the Cauvery at Mohanur, where the clan deity Karuppasamy — known as Navaladiyan, "he who sits at the foot of the Naval tree" — manifested; ancestors adopted the tree as kula vriksham.
tier: green
sources:
  - globalkongufoundation-maniyan
  - maniankulam-blogspot
  - beck-2009-religious-beliefs-trumpeter
  - wikipedia-navaladi-temple
  - wikidata-navaladi-temple
evidence_summary: >-
  Origin narrative consistent across community oral sources and aggregator websites. The etymology of "Navaladiyan" is internally coherent. Beck (2009, pp. 56–61) in The Trumpeter explicitly documents the Maniyan clan's totemic relationship with the Naval Maram and the deity Navaladiyan as the corporeal "footstool" deity of the tree — upgrading this from community-tier to academically attested. Temple location confirmed via Wikipedia and Wikidata Q7586171.
