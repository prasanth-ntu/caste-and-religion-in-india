id: maniyan-naval-taboo
statement: Maniyan Kulam members traditionally do not cut the Naval tree, do not use its wood as firewood, and reserve the first fruit of each season for the deity at the Navaladiyan temple in Mohanur.
tier: green
sources:
  - globalkongufoundation-maniyan
  - maniankulam-blogspot
  - beck-2009-religious-beliefs-trumpeter
evidence_summary: >-
  Taboo practices reported consistently in community oral tradition and online sources. Beck (2009, pp. 56–61) in The Trumpeter specifically documents that Maniyan clan members are culturally forbidden from cutting, burning, or utilizing Naval Maram wood for secular use — upgrading from community-tier to academically attested. The first-fruit offering element remains community-tier only.
