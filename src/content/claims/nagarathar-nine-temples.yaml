evidence_summary: >-
  The nine-temple ("Nava Kovil") structure of the Nagarathar is well documented in both academic and community sources. Rudner (1994) treats the temple-clusters as the foundational unit of Nagarathar social organisation; the nine temples are conventionally listed as Ilayathangudi, Mathur, Vairavan Kovil, Iraniyur, Pillaiyarpatti, Nemam, Iluppaikudi, Surakudi and Velangudi. Each temple defines a fraternal cluster within which marriage is barred, and exogamy operates across temples — structurally parallel to (though historically unrelated to) the kootam exogamy of the Kongu Vellala. The bride conventionally joins the groom's temple affiliation on marriage.
