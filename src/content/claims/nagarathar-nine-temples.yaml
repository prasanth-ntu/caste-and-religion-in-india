id: nagarathar-nine-temples
statement: The Nattukottai Chettiar (Nagarathar) community is organised into nine ancestral clan-temples ("Nava Kovil"), each of which functions as an exogamous unit — members affiliated to the same temple treat one another as kin (pangali) and may not intermarry, while marriage proceeds between members of different temples.
tier: green
sources:
