id: kongu-vellala-velir-descent
statement: The Kongu Vellala Gounder community traces partial descent from the Sangam-era velir chiefs and from cultivator migrations into the Kongu region during the early medieval period.
tier: yellow
sources:
  - kongu-mandala-satakam
  - wikipedia-kongu-vellalar
  - wikipedia-vellalar
evidence_summary: Community genealogies and the Kongu Mandala Satakam place Kongu Vellala origins in a mix of velir chiefly lineages and cultivator settlement. Some elements are corroborated by Sangam references and medieval inscriptions; other elements are clearly mythopoetic. Tiered yellow until specific lineage claims can be cross-referenced with epigraphy.
