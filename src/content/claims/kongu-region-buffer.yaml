id: kongu-region-buffer
statement: The Kongu region historically functioned as a buffer zone between the Chola, Pandya, and Chera kingdoms.
tier: green
sources:
  - wikipedia-kongu-vellalar
evidence_summary: Multiple Tamil Nadu regional histories and Sangam-era inscriptions place Kongu Nadu at the meeting point of Chera, Chola, and Pandya spheres of influence, with control oscillating between them over centuries.
