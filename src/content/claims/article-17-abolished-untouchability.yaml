id: article-17-abolished-untouchability
statement: Article 17 of the Indian Constitution, in force from 26 January 1950, abolished untouchability and forbade its practice in any form.
tier: green
sources:
  - wikipedia-article-17
evidence_summary: The text of Article 17 is unambiguous and uncontested; enforcement has been imperfect but the constitutional prohibition itself is a documented legal fact, reinforced by the Protection of Civil Rights Act 1955 and the SC/ST (Prevention of Atrocities) Act 1989.
