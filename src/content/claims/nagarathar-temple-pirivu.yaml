id: nagarathar-temple-pirivu
statement: Each Nagarathar clan-temple is itself sub-divided into internal branches called pirivu (or vagupu); the Vairavan Kovil at Vairavanpatti, for example, comprises Sirukulattur (with Periya Vakuppu, Teyanar / Tevanayakkar and Pillaiyar Vakuppu), Kalanivasal, and Maruttendrapuram.
tier: green
sources:
  - nagarathar-in-temples
evidence_summary: >-
  The community reference Nagarathar.in lists, for each of the nine Nava Kovil
  temples, a set of internal sub-divisions (pirivu / vagupu). For the Vairavan
  Kovil these are recorded as Sirukulattur — itself split into Periya Vakuppu,
  Teyanar / Tevanayakkar and Pillaiyar Vakuppu — together with Kalanivasal and
  Maruttendrapuram. This temple-then-pirivu nesting is the Nagarathar analogue of
  the way a Kongu Vellala kootam contains finer pangali sub-lineages. The
  sub-division names are community-documented; whether marriage is permitted
  across different pirivu of the same temple is not stated by this source and is
  left unasserted here.
