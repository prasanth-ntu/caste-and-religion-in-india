id: puberty-isolation-mixed-evidence
statement: Tamil first-menstruation rites (மஞ்சள் நீராட்டு விழா, manjal-neeraattu-vizha) publicly mark menarche; the accompanying seclusion period has both supportive and harmful documented effects.
tier: yellow
sources:
  - wikipedia-menarche-rituals
evidence_summary: >-
  Community recognition of menarche has measurable benefits — better
  intra-family communication about menstrual health, formal kin support,
  gift transfers. Documented harms include school absence during the
  seclusion period, food restrictions of dubious basis, and reinforcement
  of pollution framings that can become lifelong stigma. The net effect
  varies widely by family and region; aggregated evidence does not allow a
  clean green or red verdict. Tiered yellow.
