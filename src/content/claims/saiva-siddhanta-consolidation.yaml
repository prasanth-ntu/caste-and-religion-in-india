id: saiva-siddhanta-consolidation
statement: Tamil Shaiva Siddhanta was consolidated as a coherent theological school through the 12th–14th century CE Meykandar lineage, becoming the dominant philosophical framework for mainstream Tamil Shaivism.
tier: yellow
sources:
  - wikipedia-saiva-siddhanta
evidence_summary: The Meykandar–Arulnandi–Umapathi lineage and the canon of fourteen Meykanda Shastras are well-attested. Dating of individual texts and the precise nature of Shaiva Siddhanta's relationship with pan-Indian Shaiva philosophy remain matters of scholarly discussion.
