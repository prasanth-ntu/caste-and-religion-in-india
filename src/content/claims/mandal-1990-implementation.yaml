id: mandal-1990-implementation
statement: The V. P. Singh government implemented the Mandal Commission's recommendation of 27% reservation for Other Backward Classes (OBCs) in central government employment in August 1990.
tier: green
sources:
  - wikipedia-mandal-commission
  - wikipedia-reservation-in-india
evidence_summary: The implementation date (7 August 1990), the 27% figure, and the resulting nationwide protests and Indra Sawhney v. Union of India (1992) Supreme Court case are all extensively documented in legal and political history.
