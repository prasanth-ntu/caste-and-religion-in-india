id: chola-temple-patronage
statement: The Chola dynasty (c. 9th–13th century CE) patronised large-scale stone temple construction across South India, with the Brihadisvara at Thanjavur as the imperial high-water mark.
tier: green
sources:
  - wikipedia-chola-dynasty
  - thapar-2002-early-india
evidence_summary: Surviving inscriptions, the Brihadisvara temple complex (UNESCO World Heritage), and corroborating regional histories converge on a Chola temple economy that funded irrigation, art, and craft production from royal land grants. This is mainstream consensus across art history and South Asian history scholarship.
