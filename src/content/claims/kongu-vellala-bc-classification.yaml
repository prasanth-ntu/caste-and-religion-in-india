id: kongu-vellala-bc-classification
statement: Kongu Vellala Gounder is classified as a Backward Class (BC) in Tamil Nadu's reservation list, despite the community's documented socio-economic dominance across the Kongu Nadu districts (Coimbatore, Erode, Tiruppur, Salem and adjacent belts).
tier: yellow
sources:
  - wikipedia-tn-reservation
  - wikipedia-kongu-vellalar
evidence_summary: The BC vs MBC vs FC classifications in Tamil Nadu are political-administrative categories, revised periodically by the state Backward Classes Commission and contested through litigation. The "BC" listing of Kongu Vellala Gounder is well documented in the TN BC list, but whether the category accurately reflects current socio-economic reality is the subject of ongoing political debate — including periodic demands for sub-categorisation. Treat the classification as a legal-administrative fact, but its substantive justification as contested.
