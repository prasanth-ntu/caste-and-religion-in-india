id: paal-thirumanam-rite
statement: Paal-thirumanjanam (பால் திருமஞ்சனம், ritual milk-bath of the wedding couple's feet by elders) combines a literal cleansing function with a symbolic blessing transfer.
tier: rational
sources:
  - wikipedia-kongu-vellalar
rational_basis: >-
  Milk and turmeric paste both have documented mild antimicrobial
  properties; the foot-washing component before the couple enters the
  marital home has a real (if modest) hygiene function in a context of
  unpaved, walked-on village pathways. The symbolic component — elder kin
  visibly transferring blessing and accepting the new couple — does the
  social work of formalising the union beyond the mantra recitation.
evidence_summary: >-
  Detailed ethnographic treatments of the rite are sparse in academic
  literature; community-internal manuals describe it consistently across
  Kongu sub-regions. The hygiene and social-witness functions are
  defensible non-supernatural explanations, hence rational-basis tier.
