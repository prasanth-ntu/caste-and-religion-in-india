id: purusha-sukta-eternal-varna
statement: The four-varna social order descends directly from the Rigvedic Purusha Sukta as a divinely-ordained, eternal, and immutable hierarchy.
tier: red
sources:
  - wikipedia-purusha-sukta
  - wikipedia-varna-hinduism
  - thapar-2002-early-india
rebuttal: The Purusha Sukta (Rigveda 10.90) is itself widely regarded by Indologists as a late interpolation into the Rigveda Samhita, not part of the earliest stratum. Varna as a four-fold schema was elaborated in post-Vedic dharmashastra literature, not at the dawn of Indo-Aryan religious life. Crucially, varna ≠ jati — the actual endogamous groups (jatis) that structure social life today were never specified by Vedic texts and proliferated over centuries in ways the Vedic schema does not predict.
evidence_summary: The "eternal divine hierarchy" framing collapses textual stratigraphy. Most Indologists treat Purusha Sukta as later than the family books of the Rigveda; varna is a textual schema, not a complete description of any historical society; and the mapping from four varnas to thousands of jatis is itself a product of historical contingency, not divine ordinance.
