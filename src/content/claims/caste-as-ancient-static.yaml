id: caste-as-ancient-static
statement: Caste, as practised today, is an essentially ancient and unchanging institution that has persisted in its present form since Vedic times.
tier: red
sources:
  - dirks-2001-castes-of-mind
  - bayly-1999-caste
  - thapar-2002-early-india
rebuttal: Modern caste in its current rigid, pan-Indian, census-classified form is substantially a product of the past two centuries, especially colonial census operations from 1871 onwards. Pre-colonial caste was regionally variable, professionally fluid in many cases, and not organised around a single all-India administrative grid. The "frozen since Vedic times" narrative was itself partly constructed by 19th-century Orientalist scholarship and adopted by both colonial administrators and Hindu reform/revival movements.
evidence_summary: Dirks (2001) and Bayly (1999) are the canonical accounts. Pre-colonial mobility — between jatis, across varna-claim categories, through Sanskritisation and de-Sanskritisation processes — is documented for many regions. The static-ancient framing is empirically wrong even if politically convenient.
