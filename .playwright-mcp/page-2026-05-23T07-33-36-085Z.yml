        - text: "It is an idealised classification: priests, warriors, merchants, labourers. It enumerates four — and only four — categories. Dalit and Adivasi communities are placed"
        - emphasis [ref=e20]: outside
        - text: this schema by the classical texts themselves; that exclusion is the historical fact this site documents, not an endorsement.
      - paragraph [ref=e21]:
        - text: Jati is a different thing.
        - generic [ref=e22]:
          - text: Jatis are the thousands of regional, endogamous, hereditary birth-groups that actually structure marriage, occupation, and ritual obligation across the subcontinent — often loosely mapped onto varna, often not mappable at all.
          - superscript [ref=e23]:
            - 'link "Source: wikipedia-jati" [ref=e24] [cursor=pointer]':
