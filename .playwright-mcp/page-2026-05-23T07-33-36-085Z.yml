        - generic [ref=e13]:
          - text: The four-varna schema — Brahmin, Kshatriya, Vaishya, Shudra — is a textual category that appears in late-Vedic literature, most famously in the Purusha-Sukta hymn of the Rig Veda (RV 10.90).
