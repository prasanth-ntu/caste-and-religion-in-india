              - text: "[2]"
          - 'status "Evidence tier: Well-established" [ref=e28]':
            - generic [ref=e29]: 🟢
            - generic [ref=e30]: Well-established
        - text: Two Tamil Vellalas and two Punjabi Jatts are nominally “Shudra” in varna terms, but the lived realities — language, deity, marriage circle, food taboos — share almost nothing. Conflating varna with jati is the single most common source of confusion about Indian caste.
      - paragraph [ref=e31]:
        - generic [ref=e32]:
          - text: The current fixed, enumerated form of jati owes a great deal to the colonial census apparatus, particularly the 1881–1931 British Indian censuses, which forced fluid, overlapping group identities into single tick-box rows.
          - superscript [ref=e33]:
