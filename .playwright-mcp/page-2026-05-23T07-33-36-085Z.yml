    - generic [ref=e75]:
      - paragraph [ref=e76]: A note on selection bias
      - paragraph [ref=e77]: This tree is representative, not authoritative. It over-samples South Indian groups (specifically the Tamil Vellala lineage) because the project anchors at one personal leaf. A complete jati census of the subcontinent would not be a tree at all — many jatis fit awkwardly under any single varna bucket, and the colonial census-takers spent fifty years arguing about exactly that.
